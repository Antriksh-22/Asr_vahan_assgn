<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Raw vs Corrected Locality Name Accuracy</title>
  <desc id="desc">Grouped bar chart comparing raw LNA and corrected LNA for Deepgram and AssemblyAI.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="60" y="44" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Raw ASR vs Production Pipeline LNA</text>
  <text x="60" y="74" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Corrected LNA uses Bangalore locality dictionary + fuzzy matching after ASR.</text>

  <line x1="90" y1="400" x2="850" y2="400" stroke="#111827" stroke-width="2"/>
  <line x1="90" y1="80" x2="90" y2="400" stroke="#111827" stroke-width="2"/>

  <g font-family="Arial, sans-serif" font-size="13" fill="#4b5563">
    <text x="53" y="405">0%</text>
    <text x="46" y="341">20%</text>
    <text x="46" y="277">40%</text>
    <text x="46" y="213">60%</text>
    <text x="46" y="149">80%</text>
    <text x="39" y="85">100%</text>
  </g>

  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="90" y1="336" x2="850" y2="336"/>
    <line x1="90" y1="272" x2="850" y2="272"/>
    <line x1="90" y1="208" x2="850" y2="208"/>
    <line x1="90" y1="144" x2="850" y2="144"/>
    <line x1="90" y1="80" x2="850" y2="80"/>
  </g>

  <rect x="245" y="320" width="70" height="80" fill="#4263eb" rx="4"/>
  <rect x="325" y="144" width="70" height="256" fill="#2f9e44" rx="4"/>
  <text x="280" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">25%</text>
  <text x="360" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">80%</text>

  <rect x="570" y="352" width="70" height="48" fill="#4263eb" rx="4"/>
  <rect x="650" y="160" width="70" height="240" fill="#2f9e44" rx="4"/>
  <text x="605" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">15%</text>
  <text x="685" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">75%</text>

  <g font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">
    <text x="320" y="438" text-anchor="middle">Deepgram</text>
    <text x="645" y="438" text-anchor="middle">AssemblyAI</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111827">
    <rect x="590" y="34" width="16" height="16" fill="#4263eb" rx="2"/>
    <text x="614" y="47">Raw LNA</text>
    <rect x="700" y="34" width="16" height="16" fill="#2f9e44" rx="2"/>
    <text x="724" y="47">Corrected LNA</text>
  </g>

  <text x="90" y="480" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Source: results/metrics.csv. Corrected LNA is product-pipeline performance, not raw ASR transcript quality.</text>
</svg>

