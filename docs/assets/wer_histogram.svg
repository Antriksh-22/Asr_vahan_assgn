<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">WER Distribution Histogram</title>
  <desc id="desc">Histogram showing WER distribution for Deepgram and AssemblyAI across 20 recordings each.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="60" y="44" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">WER Distribution Across 20 Recordings</text>
  <text x="60" y="74" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Lower WER bins are better. WER can exceed 100% when insertions are high.</text>

  <line x1="90" y1="400" x2="850" y2="400" stroke="#111827" stroke-width="2"/>
  <line x1="90" y1="90" x2="90" y2="400" stroke="#111827" stroke-width="2"/>

  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="90" y1="350" x2="850" y2="350"/>
    <line x1="90" y1="300" x2="850" y2="300"/>
    <line x1="90" y1="250" x2="850" y2="250"/>
    <line x1="90" y1="200" x2="850" y2="200"/>
    <line x1="90" y1="150" x2="850" y2="150"/>
    <line x1="90" y1="100" x2="850" y2="100"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#4b5563">
    <text x="66" y="405">0</text>
    <text x="66" y="355">1</text>
    <text x="66" y="305">2</text>
    <text x="66" y="255">3</text>
    <text x="66" y="205">4</text>
    <text x="66" y="155">5</text>
    <text x="66" y="105">6</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#111827">
    <text x="145" y="430" text-anchor="middle">0-20%</text>
    <text x="270" y="430" text-anchor="middle">20-40%</text>
    <text x="395" y="430" text-anchor="middle">40-60%</text>
    <text x="520" y="430" text-anchor="middle">60-80%</text>
    <text x="645" y="430" text-anchor="middle">80-100%</text>
    <text x="770" y="430" text-anchor="middle">100%+</text>
  </g>

  <!-- Deepgram counts: 0, 1, 6, 7, 5, 1. Capped visually at 6 with label for 7. -->
  <rect x="112" y="400" width="38" height="0" fill="#4263eb" rx="3"/>
  <rect x="237" y="350" width="38" height="50" fill="#4263eb" rx="3"/>
  <rect x="362" y="100" width="38" height="300" fill="#4263eb" rx="3"/>
  <rect x="487" y="75" width="38" height="325" fill="#4263eb" rx="3"/>
  <rect x="612" y="150" width="38" height="250" fill="#4263eb" rx="3"/>
  <rect x="737" y="350" width="38" height="50" fill="#4263eb" rx="3"/>

  <!-- AssemblyAI counts: 0, 0, 0, 6, 5, 9. Capped visually at 6 with label for 9. -->
  <rect x="155" y="400" width="38" height="0" fill="#f03e3e" rx="3"/>
  <rect x="280" y="400" width="38" height="0" fill="#f03e3e" rx="3"/>
  <rect x="405" y="400" width="38" height="0" fill="#f03e3e" rx="3"/>
  <rect x="530" y="100" width="38" height="300" fill="#f03e3e" rx="3"/>
  <rect x="655" y="150" width="38" height="250" fill="#f03e3e" rx="3"/>
  <rect x="780" y="50" width="38" height="350" fill="#f03e3e" rx="3"/>

  <g font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">
    <text x="256" y="342">1</text>
    <text x="381" y="92">6</text>
    <text x="506" y="67">7</text>
    <text x="631" y="142">5</text>
    <text x="756" y="342">1</text>
    <text x="549" y="92">6</text>
    <text x="674" y="142">5</text>
    <text x="799" y="42">9</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" fill="#111827">
    <rect x="590" y="34" width="16" height="16" fill="#4263eb" rx="2"/>
    <text x="614" y="47">Deepgram</text>
    <rect x="700" y="34" width="16" height="16" fill="#f03e3e" rx="2"/>
    <text x="724" y="47">AssemblyAI</text>
  </g>

  <text x="90" y="480" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Source: results/metrics.csv. Bars show number of samples in each WER range.</text>
</svg>

